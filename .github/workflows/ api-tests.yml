name: API Automation CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Run Tests
        working-directory: github-api-automation
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: mvn clean test -DsuiteXmlFile=testing.xml

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: github-api-automation/target/allure-results

      - name: Install Allure
        if: always()
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.34.1/allure-2.34.1.tgz
          tar -zxvf allure-2.34.1.tgz

      - name: Generate Allure Report
        if: always()
        run: |
          ./allure-2.34.1/bin/allure generate github-api-automation/target/allure-results --clean -o allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Send Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: GitHub API Automation Test Results - ${{ job.status }}

          to: ${{ secrets.MAIL_TO }}

          from: GitHub Actions

          body: |
            API Automation execution completed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Status: ${{ job.status }}

            View execution details:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}